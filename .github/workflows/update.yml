name: update-formula

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Update formula from the latest release
        run: python scripts/update_formula.py
      - name: Commit formula update
        run: |
          if git diff --quiet; then
            echo "Formula is already current."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Formula/airoute.rb
          git commit -m "Update airoute formula"
          git push
